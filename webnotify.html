<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Classroom Notification</title>
</head>

<body>
  <h3>Classroom 通知システム</h3>
  <p>このページは常時開いておいてください</p>

<script>
const API = "https://script.google.com/macros/s/AKfycbwvAmBdLKDubcpNKFgc6_ozpWeOXsUHWOu-NOYaIoegxGFxEckIVFNzHkeXgD670GC7/exec";

// 永続化された既読管理
let seen = new Set(JSON.parse(localStorage.getItem("seen") || "[]"));

// 通知許可要求
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

async function check() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    data.forEach(item => {
      if (!seen.has(item.id)) {
        notify(item.title);
        seen.add(item.id);
      }
    });

    localStorage.setItem("seen", JSON.stringify([...seen]));

  } catch (e) {
    console.log("fetch error:", e);
  }
}

function notify(text) {
  if (Notification.permission !== "granted") return;

  new Notification("Classroom", {
    body: text
  });
}

// 定期チェック（5分）
setInterval(check, 300000);

// 初回実行
check();
</script>

</body>
</html>
